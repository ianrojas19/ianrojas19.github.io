<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/assets/img/logo/Cara Blanca 2.png" type="image/x-icon">
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/general.css">
    <link rel="stylesheet" href="/css/accounts.css">
    <title>Contact Us | Jackz Skateshop</title>


</head>

<body>

    <div class="loader-wrapper">
        <div class="loader"></div>
    </div>
    
    <div class="load-container">
        
        <div class="c-main3 container p-md-4 p-3">
            <div class="logo-cont col-12 d-flex justify-content-center">
                <a id="backtomain" href="/"><img
                        src="/assets/img/logo/logo-jackz.png"></a>
            </div>
            <div class="col-12">
                <form id="form" action="" class="d-flex flex-column py-4 px-4">
                    <h2 class="mb-2">Contact Us</h2>
                    <p class="warn mb-3">
                        Fill all the boxes with the required information to contact us.
                    </p>
                    <div class="mb-3">
                        <label for="email" class="form-label acc-lbl">Email address</label>
                        <input required type="email" class="form-control" id="email" placeholder="">
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label acc-lbl">Name</label>
                        <input required type="text" class="form-control" id="name" placeholder="">
                    </div>

                    <div class="mb-3">
                        <label for="subject" class="form-label acc-lbl">Subject</label>
                        <input required type="text" class="form-control" id="subject" placeholder="">
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label acc-lbl">Message</label>
                        <textarea required name="message" id="message" class="form-control" cols="30" rows="4"></textarea>
                    </div>

                    <button id="contact" class="btn" type="submit">Send Message</button>

                    <div class="advise-rd mt-3 text-center">
                        <span>Or send a DM in our social media:</span>
                        <br>
                        <a href="https://www.facebook.com/">Facebook</a>
                        <span>-</span>
                        <a href="https://www.instagram.com/">Instagram</a>
                        <span>-</span>
                        <a href="https://www.twitter.com/">Twitter (X)</a>
                    </div>
                </form>
            </div>

        </div>

    </div>

    <script src="/js/loadContent.js"></script>
    <script src="/js/contact.js"></script>
    <source src="node_modules/bootstrap/dist/js/bootstrap.min.js">
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

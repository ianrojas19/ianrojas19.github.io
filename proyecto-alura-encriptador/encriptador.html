<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Encriptador - Challenge Alura0NE</title>
    <link rel="stylesheet" href="/proyecto-alura-encriptador/style.css">
    <link rel="shortcut icon" href="/proyecto-alura-encriptador/assets/img/logo/Logo.svg" type="image/x-icon">
</head>

<body>

    <header>
        <img src="/proyecto-alura-encriptador/assets/img/logo/Logo.svg" alt="LOGO ALURA LATAM">
    </header>

    <main>
        <section id="message">

            <textarea name="text-to-encrypt" id="text-to-encrypt" placeholder="Ingresa el texto aquí" cols="30"
                rows="10"></textarea>

            <div id="warn-message">
                <img src="/proyecto-alura-encriptador/assets/img/icons/info-circle-filled.svg">
                <span>Ingresa solo letras minúsculas y sin tílde.</span>
            </div>

            <div id="encrypt-or-decrypt-btns">
                <button id="msg-encrypt">Encriptar</button>
                <button id="msg-decrypt">Desencriptar</button>
            </div>
        </section>

        <section id="msg-result">
            <textarea name="encrypt-result" id="encrypt-result" class="encrypt-success" cols="30" rows="10"
                readonly></textarea>

            <button id="copy-to-clipboard" class="encrypt-success">Copiar</button>

            <div id="error-msg">
                <img src="/proyecto-alura-encriptador/assets/img/error/Muñeco.svg" class="encrypt-fail" alt="Message not found">
                <p id="error-text" class="encrypt-fail">Ningún mensaje fue encontrado</p>
                <span id="error-recomendation" class="encrypt-fail">Ingresa el texto que desees encriptar o desencriptar
                    en la <b id="goto-enc-box">"caja de encripción"</b>.</span>
            </div>
        </section>
    </main>





    <script src="/proyecto-alura-encriptador/app.js"></script>
</body>

</html>
